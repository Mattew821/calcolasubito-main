name: CI

on:
  push:
    branches:
      - calcolasubito-main
      - main
  pull_request:
    branches:
      - calcolasubito-main
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npx playwright test
